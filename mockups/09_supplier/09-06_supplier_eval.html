<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>협력사 사후 평가 (Q-5스타) | DevSRM</title>
<link rel="stylesheet" href="../common/tokens.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  /* ── 그리드 영역 (09-01/09-05 동일) ── */
  .grid-area {
    flex:1; overflow:hidden; display:flex; flex-direction:column; padding:14px 24px 16px;
  }
  .table-fill { flex:1; overflow:auto; }
  .table-fill::-webkit-scrollbar { width:6px; height:6px; }
  .table-fill::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:3px; }

  /* ── 링크·상태 (09-01/09-05 동일) ── */
  .td-link { color:var(--blue); font-weight:600; text-decoration:none; }
  .td-link:hover { text-decoration:underline; }

  .st { display:inline-flex; align-items:center; gap:5px; font-size:12px; white-space:nowrap; }
  .st::before { content:''; width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .st-ok   { color:var(--status-ok);   } .st-ok::before   { background:var(--status-ok);   }
  .st-prog { color:var(--status-prog); } .st-prog::before { background:var(--status-prog); }
  .st-warn { color:var(--status-warn); } .st-warn::before { background:var(--status-warn); }
  .st-bad  { color:var(--status-bad);  } .st-bad::before  { background:var(--status-bad);  }

  /* ── 분기 탭 (09-06 고유) ── */
  .type-tabs {
    display:flex; gap:0;
    border-bottom:2px solid var(--border);
    margin-bottom:10px;
    flex-shrink:0;
  }
  .type-tab {
    padding:0 20px; height:36px;
    font-size:13px; font-weight:500; font-family:'Pretendard',sans-serif;
    cursor:pointer; border:none; background:transparent;
    color:var(--text-sub);
    border-bottom:2px solid transparent;
    margin-bottom:-2px;
  }
  .type-tab.active { color:var(--blue); border-bottom-color:var(--blue); font-weight:600; }
  .type-tab:hover:not(.active) { color:var(--text); }

  /* ── eval-table ── */
  .eval-table td {
    padding:0 10px; height:34px;
    border:1px solid var(--border);
    text-align:center; vertical-align:middle; white-space:nowrap;
  }
  .eval-table td.name {
    text-align:left; padding-left:12px;
    font-weight:500; background:var(--grid-row-alt);
  }
  .eval-table td.score { font-variant-numeric:tabular-nums; text-align:right; padding-right:14px; }
  .eval-table td.avg   { font-weight:700; font-variant-numeric:tabular-nums; text-align:right; padding-right:14px; }
  .eval-table td.act   { text-align:left; padding-left:12px; color:var(--text-sub); }
  .eval-table tbody tr:nth-child(even) td { background:var(--grid-row-alt); }
  .eval-table tbody tr:nth-child(even) td.name { background:var(--grid-row-alt); }
  .eval-table tbody tr:hover td { background:var(--grid-hover); }
  .eval-table tbody tr:hover td.name { background:var(--grid-hover); }
</style>
</head>

<body data-menu="09-06">
<div class="page-wrap">

  <!-- 페이지 타이틀 바 (저장 버튼 없음 — 조회성 화면) -->
  <div class="page-title-bar">
    <span class="page-title">협력사 사후 평가 (Q-5스타)</span>
    <div class="page-title-spacer"></div>
  </div>

  <!-- 검색 바 (09-01/09-05 동일 클래스) -->
  <div class="search-bar" style="gap:8px">
    <div class="search-wrap">
      <input type="text" id="f-search" placeholder="Search" oninput="applyFilter()">
      <i data-lucide="search" class="s-icon" style="width:15px;height:15px"></i>
    </div>
    <button class="btn-filter" onclick="toggleFilter()">
      <i data-lucide="filter" style="width:14px;height:14px;color:#dc2626"></i>필터
    </button>
    <button class="btn-status" onclick="toggleStatusPanel()">
      <i data-lucide="bar-chart-2" style="width:14px;height:14px;color:var(--blue)"></i>등급
    </button>
    <!-- 평가연도 — date-range 컨테이너 재사용 -->
    <div class="date-range">
      <span style="font-size:12px;color:var(--text-sub);white-space:nowrap">평가연도</span>
      <select id="f-year-bar" onchange="syncYear();applyFilter()"
        style="border:none;outline:none;font-size:12px;font-family:'Pretendard',sans-serif;
               color:var(--text);background:transparent;cursor:pointer;height:28px;margin-left:6px">
        <option value="2026" selected>2026</option>
        <option value="2025">2025</option>
      </select>
      <i data-lucide="calendar" style="width:14px;height:14px;color:var(--text-mute);margin-left:4px"></i>
    </div>
  </div>

  <!-- 필터 패널 (09-01/09-05 동일 클래스, 기본 hidden) -->
  <div class="filter-panel" id="filter-panel">
    <div class="search-field">
      <span class="search-label">평가연도</span>
      <select class="search-input" id="f-year"
        style="width:88px;height:28px;padding:0 8px;cursor:pointer" onchange="syncYearBar();applyFilter()">
        <option value="2026" selected>2026</option>
        <option value="2025">2025</option>
      </select>
    </div>
    <div class="search-field">
      <span class="search-label">분기</span>
      <select class="search-input" id="f-qtr"
        style="width:72px;height:28px;padding:0 8px;cursor:pointer" onchange="syncQuarterTab();applyFilter()">
        <option value="1Q">1Q</option>
        <option value="2Q">2Q</option>
        <option value="3Q" selected>3Q</option>
        <option value="4Q">4Q</option>
      </select>
    </div>
    <div class="search-field">
      <span class="search-label">등급</span>
      <select class="search-input" id="f-star-panel"
        style="width:88px;height:28px;padding:0 8px;cursor:pointer" onchange="syncStarStrip();applyFilter()">
        <option value="">전체</option>
        <option value="5스타">5스타</option>
        <option value="4스타">4스타</option>
        <option value="3스타">3스타</option>
        <option value="2스타">2스타</option>
        <option value="1스타">1스타</option>
      </select>
    </div>
    <div class="search-field">
      <span class="search-label">협력사</span>
      <input type="text" class="search-input" id="f-name"
        placeholder="협력사명" oninput="applyFilter()"
        style="width:160px;height:28px;padding:0 8px">
    </div>
  </div>

  <!-- 등급 분포 스트립 (09-01/09-05 status-strip 동일 클래스) -->
  <div class="status-strip" id="status-strip">
    <button class="ss-btn active" onclick="setStar(this,'')">
      전체 <span class="ss-cnt" id="cnt-all">0</span>
    </button>
    <button class="ss-btn" onclick="setStar(this,'5스타')">
      5스타 <span class="ss-cnt" id="cnt-5">0</span>
    </button>
    <button class="ss-btn" onclick="setStar(this,'4스타')">
      4스타 <span class="ss-cnt" id="cnt-4">0</span>
    </button>
    <button class="ss-btn" onclick="setStar(this,'3스타')">
      3스타 <span class="ss-cnt" id="cnt-3">0</span>
    </button>
    <button class="ss-btn" onclick="setStar(this,'2스타')">
      2스타 <span class="ss-cnt" id="cnt-2">0</span>
    </button>
    <button class="ss-btn" onclick="setStar(this,'1스타')">
      1스타 <span class="ss-cnt" id="cnt-1">0</span>
    </button>
  </div>

  <!-- 그리드 영역 -->
  <div class="grid-area">

    <!-- 분기 탭 (09-06 고유 축 — search-bar·status-strip 아래, 그리드 바로 위) -->
    <div class="type-tabs">
      <button class="type-tab" onclick="switchQuarter(this,'1Q')">2026 1Q</button>
      <button class="type-tab" onclick="switchQuarter(this,'2Q')">2Q</button>
      <button class="type-tab active" onclick="switchQuarter(this,'3Q')">3Q</button>
      <button class="type-tab" onclick="switchQuarter(this,'4Q')">4Q</button>
    </div>

    <!-- 그리드 헤더 -->
    <div style="margin-bottom:6px;display:flex;align-items:center">
      <span style="font-size:13px;font-weight:600;color:var(--text)">협력사별 Q-5스타 평가</span>
      <span style="font-size:11px;color:var(--text-mute);margin-left:10px">
        각 항목 1~5점 &nbsp;|&nbsp;
        5스타&ge;4.5 &middot; 4스타&ge;3.5 &middot; 3스타&ge;2.5 &middot; 2스타&ge;1.5 &middot; 1스타 미만
      </span>
      <span style="margin-left:auto;font-size:12px;color:var(--text-sub)" id="row-count">0건</span>
    </div>

    <div class="table-fill">
      <table class="data-table eval-table" id="tbl"
        style="border:1px solid var(--border);border-radius:4px">
        <thead>
          <tr>
            <th style="width:40px">
              <input type="checkbox" id="chk-all" onclick="toggleAll(this)"
                style="width:14px;height:14px;accent-color:var(--blue);cursor:pointer">
            </th>
            <th style="width:180px;text-align:left;padding-left:12px">협력사</th>
            <th style="width:76px">품질(Q)</th>
            <th style="width:76px">납기(D)</th>
            <th style="width:76px">가격(P)</th>
            <th style="width:76px">기술(T)</th>
            <th style="width:76px">시스템(S)</th>
            <th style="width:72px">평균</th>
            <th style="width:100px">등급</th>
            <th>조치사항</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

  </div>

</div>

<script>
/* ── 분기별 mock 데이터 — 평균 전수 검산 완료
   등급 기준: avg>=4.5→5스타 / >=3.5→4스타 / >=2.5→3스타 / >=1.5→2스타 / else→1스타
   1Q: A(4.5+4.6+4.1+4.4+4.5)/5=4.42→4스타  B(3.9+4.0+4.2+3.6+3.8)/5=3.90→4스타
       C(3.2+3.5+3.8+3.1+3.3)/5=3.38→3스타  D(2.6+2.8+3.2+2.4+2.7)/5=2.74→3스타
   2Q: A(4.7+4.6+4.2+4.5+4.6)/5=4.52→5스타  B(4.0+3.9+4.3+3.7+3.9)/5=3.96→4스타
       C(3.4+3.7+3.9+3.3+3.5)/5=3.56→4스타  D(2.7+2.9+3.4+2.5+2.8)/5=2.86→3스타
   3Q: A(4.8+4.7+4.3+4.6+4.7)/5=4.62→5스타  B(4.2+4.0+4.4+3.8+4.1)/5=4.10→4스타
       C(3.5+3.8+4.0+3.4+3.6)/5=3.66→4스타  D(2.8+3.0+3.5+2.6+2.9)/5=2.96→3스타
   4Q: A(4.6+4.8+4.4+4.7+4.8)/5=4.66→5스타  B(4.1+4.2+4.5+4.0+4.2)/5=4.20→4스타
       C(3.3+3.6+3.7+3.2+3.4)/5=3.44→3스타  D(2.5+2.7+3.1+2.3+2.6)/5=2.64→3스타
*/
var QUARTERS = {
  '1Q': [
    { name:'A사 (동희부품)',   q:4.5, d:4.6, p:4.1, t:4.4, s:4.5, avg:4.42, star:'4스타', action:'우선 발주 후보' },
    { name:'B사 (한국알미늄)', q:3.9, d:4.0, p:4.2, t:3.6, s:3.8, avg:3.90, star:'4스타', action:'우선 발주 후보' },
    { name:'C사 (신흥정공)',   q:3.2, d:3.5, p:3.8, t:3.1, s:3.3, avg:3.38, star:'3스타', action:'정상 거래'       },
    { name:'D사 (대원금속)',   q:2.6, d:2.8, p:3.2, t:2.4, s:2.7, avg:2.74, star:'3스타', action:'정상 거래'       }
  ],
  '2Q': [
    { name:'A사 (동희부품)',   q:4.7, d:4.6, p:4.2, t:4.5, s:4.6, avg:4.52, star:'5스타', action:'우선 발주'      },
    { name:'B사 (한국알미늄)', q:4.0, d:3.9, p:4.3, t:3.7, s:3.9, avg:3.96, star:'4스타', action:'우선 발주 후보' },
    { name:'C사 (신흥정공)',   q:3.4, d:3.7, p:3.9, t:3.3, s:3.5, avg:3.56, star:'4스타', action:'우선 발주 후보' },
    { name:'D사 (대원금속)',   q:2.7, d:2.9, p:3.4, t:2.5, s:2.8, avg:2.86, star:'3스타', action:'정상 거래'       }
  ],
  '3Q': [
    { name:'A사 (동희부품)',   q:4.8, d:4.7, p:4.3, t:4.6, s:4.7, avg:4.62, star:'5스타', action:'우선 발주'      },
    { name:'B사 (한국알미늄)', q:4.2, d:4.0, p:4.4, t:3.8, s:4.1, avg:4.10, star:'4스타', action:'우선 발주 후보' },
    { name:'C사 (신흥정공)',   q:3.5, d:3.8, p:4.0, t:3.4, s:3.6, avg:3.66, star:'4스타', action:'우선 발주 후보' },
    { name:'D사 (대원금속)',   q:2.8, d:3.0, p:3.5, t:2.6, s:2.9, avg:2.96, star:'3스타', action:'정상 거래'       }
  ],
  '4Q': [
    { name:'A사 (동희부품)',   q:4.6, d:4.8, p:4.4, t:4.7, s:4.8, avg:4.66, star:'5스타', action:'우선 발주'      },
    { name:'B사 (한국알미늄)', q:4.1, d:4.2, p:4.5, t:4.0, s:4.2, avg:4.20, star:'4스타', action:'우선 발주 후보' },
    { name:'C사 (신흥정공)',   q:3.3, d:3.6, p:3.7, t:3.2, s:3.4, avg:3.44, star:'3스타', action:'정상 거래'       },
    { name:'D사 (대원금속)',   q:2.5, d:2.7, p:3.1, t:2.3, s:2.6, avg:2.64, star:'3스타', action:'정상 거래'       }
  ]
};

var STAR_CLS = { '5스타':'st-ok', '4스타':'st-prog', '3스타':'st-warn', '2스타':'st-bad', '1스타':'st-bad' };

var currentQuarter = '3Q';
var currentStar    = '';

function f1(v) { return v.toFixed(1); }
function f2(v) { return v.toFixed(2); }

function renderRows(rows) {
  document.getElementById('tbody').innerHTML = rows.map(function(d) {
    return '<tr>'
      + '<td class="c" onclick="event.stopPropagation()">'
      +   '<input type="checkbox" class="row-chk"'
      +     ' style="width:14px;height:14px;accent-color:var(--blue);cursor:pointer"'
      +     ' onchange="onRowCheck()">'
      + '</td>'
      + '<td class="name">' + d.name + '</td>'
      + '<td class="score">' + f1(d.q) + '</td>'
      + '<td class="score">' + f1(d.d) + '</td>'
      + '<td class="score">' + f1(d.p) + '</td>'
      + '<td class="score">' + f1(d.t) + '</td>'
      + '<td class="score">' + f1(d.s) + '</td>'
      + '<td class="avg">'   + f2(d.avg) + '</td>'
      + '<td class="c"><span class="st ' + STAR_CLS[d.star] + '">' + d.star + '</span></td>'
      + '<td class="act">' + d.action + '</td>'
      + '</tr>';
  }).join('');
  document.getElementById('row-count').textContent = rows.length + '건';
  lucide.createIcons();
}

function updateCounts() {
  var all = QUARTERS[currentQuarter];
  document.getElementById('cnt-all').textContent = all.length;
  document.getElementById('cnt-5').textContent = all.filter(function(d){ return d.star === '5스타'; }).length;
  document.getElementById('cnt-4').textContent = all.filter(function(d){ return d.star === '4스타'; }).length;
  document.getElementById('cnt-3').textContent = all.filter(function(d){ return d.star === '3스타'; }).length;
  document.getElementById('cnt-2').textContent = all.filter(function(d){ return d.star === '2스타'; }).length;
  document.getElementById('cnt-1').textContent = all.filter(function(d){ return d.star === '1스타'; }).length;
}

function applyFilter() {
  var q    = (document.getElementById('f-search').value || '').trim().toLowerCase();
  var name = (document.getElementById('f-name').value   || '').trim().toLowerCase();

  var rows = QUARTERS[currentQuarter].filter(function(d) {
    var nm = d.name.toLowerCase();
    if (currentStar && d.star !== currentStar) return false;
    if (q    && !nm.includes(q))    return false;
    if (name && !nm.includes(name)) return false;
    return true;
  });
  renderRows(rows);
  updateCounts();
}

/* 분기 탭 클릭 */
function switchQuarter(el, qtr) {
  currentQuarter = qtr;
  document.querySelectorAll('.type-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('f-qtr').value = qtr;
  /* 스타 필터 초기화 */
  currentStar = '';
  document.getElementById('f-star-panel').value = '';
  document.querySelectorAll('.ss-btn').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.ss-btn')[0].classList.add('active');
  applyFilter();
}

/* 등급 스트립 클릭 */
function setStar(btn, star) {
  currentStar = star;
  document.querySelectorAll('.ss-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('f-star-panel').value = star;
  applyFilter();
}

/* 필터 패널 분기 → 탭 동기화 */
function syncQuarterTab() {
  var qtr = document.getElementById('f-qtr').value;
  if (!qtr) return;
  currentQuarter = qtr;
  var qtrs = ['1Q', '2Q', '3Q', '4Q'];
  document.querySelectorAll('.type-tab').forEach(function(t, i){
    t.classList.toggle('active', qtrs[i] === qtr);
  });
}

/* 필터 패널 등급 → 스트립 동기화 */
function syncStarStrip() {
  var sf = document.getElementById('f-star-panel').value;
  currentStar = sf;
  var stars = ['', '5스타', '4스타', '3스타', '2스타', '1스타'];
  document.querySelectorAll('.ss-btn').forEach(function(b, i){
    b.classList.toggle('active', stars[i] === sf);
  });
  if (!sf) document.querySelectorAll('.ss-btn')[0].classList.add('active');
}

/* 연도 동기화 */
function syncYear()    { document.getElementById('f-year').value     = document.getElementById('f-year-bar').value; }
function syncYearBar() { document.getElementById('f-year-bar').value = document.getElementById('f-year').value; }

function toggleFilter() {
  document.getElementById('filter-panel').classList.toggle('open');
}
function toggleStatusPanel() {
  var el = document.getElementById('status-strip');
  el.style.display = el.style.display === 'none' ? 'flex' : 'none';
}

function toggleAll(master) {
  document.querySelectorAll('.row-chk').forEach(function(c) {
    c.checked = master.checked;
    c.closest('tr').classList.toggle('selected', master.checked);
  });
}
function onRowCheck() {
  var all     = document.querySelectorAll('.row-chk');
  var checked = document.querySelectorAll('.row-chk:checked');
  var master  = document.getElementById('chk-all');
  master.indeterminate = checked.length > 0 && checked.length < all.length;
  master.checked       = all.length > 0 && checked.length === all.length;
}

/* 초기 렌더 — 3Q */
applyFilter();
</script>

<script src="../common/sidebar.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
