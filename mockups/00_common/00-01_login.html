<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>로그인 | DevSRM</title>
<link rel="stylesheet" href="../common/tokens.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #eef1f5 0%, #e3e8ef 100%);
  }

  .login-card {
    width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 24px rgba(0,0,0,.10);
    padding: 40px 36px 28px;
  }

  /* 로고 */
  .login-logo {
    font-size: 26px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: -0.5px;
    text-align: center;
  }
  .login-logo span { color: var(--blue); }
  .login-sub {
    font-size: 13px;
    color: var(--text-sub);
    text-align: center;
    margin-top: 6px;
    margin-bottom: 28px;
  }

  /* 폼 */
  .login-field { margin-bottom: 14px; }
  .login-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-sub);
    margin-bottom: 6px;
  }
  .login-input-wrap { position: relative; }
  .login-input {
    width: 100%;
    height: 42px;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0 38px 0 12px;
    font-size: 14px;
    font-family: 'Pretendard', sans-serif;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .login-input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(26,86,170,0.12);
  }
  .login-input-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-mute);
    cursor: default;
  }
  .login-input-icon.toggle { cursor: pointer; }

  /* 상태 유지 */
  .login-keep {
    display: flex;
    align-items: center;
    gap: 7px;
    margin: 4px 0 20px;
    font-size: 13px;
    color: var(--text-sub);
    cursor: pointer;
  }
  .login-keep input { width: 15px; height: 15px; accent-color: var(--blue); cursor: pointer; }

  /* 로그인 버튼 */
  .login-btn {
    width: 100%;
    height: 44px;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Pretendard', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: background .15s;
  }
  .login-btn:hover { background: var(--navy-dark); }

  /* 하단 */
  .login-links {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 18px;
    font-size: 12px;
    color: var(--text-sub);
  }
  .login-links a { color: var(--text-sub); text-decoration: none; }
  .login-links a:hover { color: var(--blue); text-decoration: underline; }
  .login-links .sep { width: 1px; height: 11px; background: var(--border-strong); }

  .login-version {
    text-align: center;
    font-size: 11px;
    color: var(--text-mute);
    margin-top: 22px;
  }
</style>
</head>

<body>
  <div class="login-card">
    <div class="login-logo">Dev<span>SRM</span></div>
    <div class="login-sub">동희산업 개발구매시스템</div>

    <form onsubmit="doLogin(event)">
      <div class="login-field">
        <label class="login-label" for="login-id">아이디</label>
        <div class="login-input-wrap">
          <input type="text" id="login-id" class="login-input" value="kim.dev" placeholder="아이디를 입력하세요" autocomplete="username">
          <i data-lucide="user" class="login-input-icon" style="width:16px;height:16px"></i>
        </div>
      </div>

      <div class="login-field">
        <label class="login-label" for="login-pw">비밀번호</label>
        <div class="login-input-wrap">
          <input type="password" id="login-pw" class="login-input" value="devsrm2026" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
          <i data-lucide="eye" class="login-input-icon toggle" id="pw-toggle" onclick="togglePw()" style="width:16px;height:16px"></i>
        </div>
      </div>

      <label class="login-keep">
        <input type="checkbox" checked>
        <span>로그인 상태 유지</span>
      </label>

      <button type="submit" class="login-btn">
        <i data-lucide="log-in" style="width:17px;height:17px"></i>로그인
      </button>
    </form>

    <div class="login-links">
      <a href="#" onclick="return false">비밀번호 찾기</a>
      <span class="sep"></span>
      <a href="#" onclick="return false">관리자 문의</a>
    </div>

    <div class="login-version">DevSRM v1.0 · &copy; 2026 Sepoasoft</div>
  </div>

<script>
  function doLogin(e) {
    e.preventDefault();
    location.href = '00-02_dashboard.html';
  }
  function togglePw() {
    var pw = document.getElementById('login-pw');
    var ic = document.getElementById('pw-toggle');
    var isPw = pw.type === 'password';
    pw.type = isPw ? 'text' : 'password';
    ic.setAttribute('data-lucide', isPw ? 'eye-off' : 'eye');
    if (window.lucide) window.lucide.createIcons({ nodes: [ic.parentNode] });
  }
</script>
<script>lucide.createIcons();</script>
</body>
</html>
