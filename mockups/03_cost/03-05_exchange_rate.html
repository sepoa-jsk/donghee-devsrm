<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>환율 관리 | DevSRM</title>
<link rel="stylesheet" href="../common/tokens.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .search-wrap { flex:1; position:relative; max-width:560px; }
  .search-wrap input {
    width:100%; height:32px; border:1px solid var(--border); border-radius:4px;
    padding:0 34px 0 12px; font-size:13px; font-family:'Pretendard',sans-serif;
    color:var(--text); background:var(--surface); outline:none; transition:border-color .15s;
  }
  .search-wrap input:focus { border-color:var(--blue); box-shadow:0 0 0 2px rgba(26,86,170,.12); }
  .search-wrap input::placeholder { color:var(--text-mute); }
  .search-wrap .s-icon {
    position:absolute; right:9px; top:50%; transform:translateY(-50%);
    color:#dc2626; pointer-events:none;
  }
  .btn-ctrl {
    height:32px; padding:0 12px; border-radius:4px;
    font-size:13px; font-family:'Pretendard',sans-serif; font-weight:500;
    display:inline-flex; align-items:center; gap:5px;
    background:var(--surface); border:1px solid var(--border); color:var(--text);
    cursor:pointer; white-space:nowrap; transition:background .12s;
  }
  .btn-ctrl:hover { background:var(--bg); }
  .date-range {
    height:32px; display:flex; align-items:center; gap:4px;
    border:1px solid var(--border); border-radius:4px;
    padding:0 10px; background:var(--surface); font-size:12px;
  }
  .date-range input[type="date"] {
    border:none; outline:none; font-size:12px;
    font-family:'Pretendard',sans-serif; color:var(--text);
    background:transparent; width:108px; cursor:pointer;
  }
  .date-range input[type="date"]::-webkit-calendar-picker-indicator { display:none; }
  .date-range .dr-sep { color:var(--text-mute); }

  .status-strip {
    height:36px; background:var(--surface);
    display:flex; align-items:center; padding:0 24px; gap:24px; flex-shrink:0;
  }
  .ss-btn {
    background:none; border:none; cursor:pointer;
    font-size:12px; color:var(--text-sub); font-family:'Pretendard',sans-serif;
    display:flex; align-items:center; gap:5px; padding:0; transition:color .1s;
  }
  .ss-btn:hover { color:var(--text); }
  .ss-btn.active { color:var(--blue); font-weight:600; }
  .ss-cnt { font-weight:700; font-variant-numeric:tabular-nums; }
  .ss-btn.active .ss-cnt { color:var(--blue); }

  .filter-panel {
    background:var(--bg); border-bottom:1px solid var(--border);
    padding:10px 24px; display:none; flex-shrink:0;
    gap:16px; align-items:center;
  }
  .filter-panel.open { display:flex; }

  .grid-area {
    flex:1; overflow:hidden; display:flex; flex-direction:column;
    padding:14px 24px 16px;
  }
  .table-fill { flex:1; overflow-y:auto; }
  .table-fill::-webkit-scrollbar { width:6px; }
  .table-fill::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:3px; }

  .st { display:inline-flex; align-items:center; gap:5px; font-size:12px; white-space:nowrap; }
  .st::before { content:''; width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .st-ok   { color:var(--text);       } .st-ok::before   { background:var(--navy); }
  .st-prog { color:var(--text-sub);   } .st-prog::before { background:var(--text-sub); }
  .st-wait { color:var(--text-mute);  } .st-wait::before { background:var(--border-strong); }
  .st-bad  { color:var(--status-bad); } .st-bad::before  { background:var(--status-bad); }
</style>
</head>

<body data-menu="03-05">
<div class="page-wrap">

  <!-- 타이틀 바 -->
  <div class="page-title-bar">
    <span class="page-title">환율 관리</span>
  </div>

  <!-- 검색 바 -->
  <div class="search-bar" style="gap:8px">
    <div class="search-wrap">
      <input type="text" id="f-search" placeholder="Search" oninput="applyFilter()">
      <i data-lucide="search" class="s-icon" style="width:15px;height:15px"></i>
    </div>
    <button class="btn-ctrl" onclick="toggleFilter()">
      <i data-lucide="filter" style="width:14px;height:14px;color:#dc2626"></i>필터
    </button>
    <button class="btn-ctrl" onclick="toggleStatusPanel()">
      <i data-lucide="bar-chart-2" style="width:14px;height:14px;color:var(--blue)"></i>상태
    </button>
    <div class="date-range">
      <input type="date" id="f-from" value="2026-01-01" onchange="applyFilter()">
      <span class="dr-sep">~</span>
      <input type="date" id="f-to"   value="2026-12-31" onchange="applyFilter()">
      <i data-lucide="calendar" style="width:14px;height:14px;color:var(--text-mute);margin-left:2px"></i>
    </div>
    <div class="ml-auto" style="display:flex;gap:8px">
      <button class="btn btn-secondary" onclick="openModal()">
        <i data-lucide="upload"></i>일괄 업로드
      </button>
      <button class="btn btn-primary" onclick="openModal()">
        <i data-lucide="plus"></i>환율 등록
      </button>
    </div>
  </div>

  <!-- 필터 패널 -->
  <div class="filter-panel" id="filter-panel">
    <div class="search-field">
      <span class="search-label">통화</span>
      <select class="search-select" id="f-cur" onchange="applyFilter()" style="width:100px">
        <option value="">전체</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
        <option value="JPY">JPY</option>
        <option value="CNY">CNY</option>
      </select>
    </div>
    <div class="search-field">
      <span class="search-label">기준월</span>
      <input type="month" class="search-input" id="f-month" style="width:130px" onchange="applyFilter()">
    </div>
    <div class="search-field">
      <span class="search-label">출처</span>
      <select class="search-select" id="f-src" onchange="applyFilter()" style="width:110px">
        <option value="">전체</option>
        <option value="한국은행">한국은행</option>
        <option value="전망치">전망치</option>
        <option value="직접입력">직접입력</option>
      </select>
    </div>
  </div>

  <!-- 상태 스트립 -->
  <div class="status-strip" id="status-strip">
    <button class="ss-btn active" data-s="" onclick="setStatus(this,'')">
      전체 <span class="ss-cnt" id="cnt-all">0</span>
    </button>
    <button class="ss-btn" data-s="적용중" onclick="setStatus(this,'적용중')">
      적용중 <span class="ss-cnt" id="cnt-active">0</span>
    </button>
    <button class="ss-btn" data-s="예정" onclick="setStatus(this,'예정')">
      예정 <span class="ss-cnt" id="cnt-plan">0</span>
    </button>
    <button class="ss-btn" data-s="만료" onclick="setStatus(this,'만료')">
      만료 <span class="ss-cnt" id="cnt-expired">0</span>
    </button>
    <button class="ss-btn" data-s="임시" onclick="setStatus(this,'임시')">
      임시 <span class="ss-cnt" id="cnt-temp">0</span>
    </button>
  </div>

  <!-- 그리드 -->
  <div class="grid-area">
    <div class="table-fill">
      <table class="data-table" id="main-table">
        <thead>
          <tr>
            <th style="width:36px;text-align:center">
              <input type="checkbox" id="chk-all" onclick="toggleAll(this)"
                style="width:14px;height:14px;accent-color:var(--blue);cursor:pointer">
            </th>
            <th style="width:36px">No</th>
            <th style="width:60px">통화</th>
            <th style="width:80px">기준월</th>
            <th class="r" style="width:110px">적용환율(원)</th>
            <th class="r" style="width:110px">전망치(원)</th>
            <th class="r" style="width:90px">전월대비(원)</th>
            <th style="width:200px">적용 기간</th>
            <th style="width:80px">출처</th>
            <th style="width:96px">LME 연동</th>
            <th style="width:70px">상태</th>
            <th style="width:56px">편집</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- 환율 등록 모달 -->
<div class="modal-backdrop" id="modal-reg">
  <div class="modal-box" style="max-width:520px">
    <div class="modal-header">
      <span class="modal-title">환율 등록</span>
      <button class="modal-close" onclick="closeModal()">
        <i data-lucide="x" style="width:14px;height:14px"></i>
      </button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:14px">
      <div class="form-row form-row-2">
        <div class="form-field">
          <label class="form-label"><span class="req">*</span>통화</label>
          <select class="form-select" id="m-cur">
            <option>USD</option><option>EUR</option><option>JPY</option><option>CNY</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label"><span class="req">*</span>기준월</label>
          <input type="month" class="form-input" id="m-month" value="2026-07">
        </div>
      </div>
      <div class="form-row form-row-2">
        <div class="form-field">
          <label class="form-label"><span class="req">*</span>적용 환율 (원)</label>
          <input type="text" class="form-input num" id="m-rate" placeholder="예: 1,392">
        </div>
        <div class="form-field">
          <label class="form-label">전망치 (원)</label>
          <input type="text" class="form-input num" id="m-forecast" placeholder="예: 1,400">
        </div>
      </div>
      <div class="form-row form-row-2">
        <div class="form-field">
          <label class="form-label"><span class="req">*</span>적용 시작일</label>
          <input type="date" class="form-input" id="m-from" value="2026-07-01">
        </div>
        <div class="form-field">
          <label class="form-label"><span class="req">*</span>적용 종료일</label>
          <input type="date" class="form-input" id="m-to" value="2026-07-31">
        </div>
      </div>
      <div class="form-row form-row-2">
        <div class="form-field">
          <label class="form-label">출처</label>
          <select class="form-select" id="m-src">
            <option>한국은행</option><option>전망치</option><option>직접입력</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label">상태</label>
          <select class="form-select" id="m-status">
            <option>예정</option><option>임시</option><option>적용중</option>
          </select>
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">비고</label>
        <input type="text" class="form-input" placeholder="입력 근거, 참고사항 등">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveModal()">
        <i data-lucide="save"></i>저장
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast" style="display:none"></div>

<script>
const ROWS = [
  { no:1,  cur:'USD', curType:'usd', month:'2026-07', rate:1392, forecast:1405, prev:1380, from:'2026-07-01', to:'2026-07-31', src:'전망치',  lme:true,  status:'예정'  },
  { no:2,  cur:'USD', curType:'usd', month:'2026-06', rate:1380, forecast:1392, prev:1369, from:'2026-06-01', to:'2026-06-30', src:'한국은행', lme:true,  status:'적용중' },
  { no:3,  cur:'USD', curType:'usd', month:'2026-05', rate:1369, forecast:1375, prev:1355, from:'2026-05-01', to:'2026-05-31', src:'한국은행', lme:true,  status:'만료'  },
  { no:4,  cur:'USD', curType:'usd', month:'2026-04', rate:1355, forecast:1360, prev:1342, from:'2026-04-01', to:'2026-04-30', src:'한국은행', lme:true,  status:'만료'  },
  { no:5,  cur:'USD', curType:'usd', month:'2026-03', rate:1342, forecast:1350, prev:1330, from:'2026-03-01', to:'2026-03-31', src:'한국은행', lme:true,  status:'만료'  },
  { no:6,  cur:'EUR', curType:'eur', month:'2026-06', rate:1510, forecast:1525, prev:1498, from:'2026-06-01', to:'2026-06-30', src:'한국은행', lme:false, status:'적용중' },
  { no:7,  cur:'EUR', curType:'eur', month:'2026-05', rate:1498, forecast:1505, prev:1482, from:'2026-05-01', to:'2026-05-31', src:'한국은행', lme:false, status:'만료'  },
  { no:8,  cur:'JPY', curType:'jpy', month:'2026-06', rate:9.21, forecast:9.35, prev:9.10, from:'2026-06-01', to:'2026-06-30', src:'한국은행', lme:false, status:'적용중' },
  { no:9,  cur:'JPY', curType:'jpy', month:'2026-05', rate:9.10, forecast:9.15, prev:9.02, from:'2026-05-01', to:'2026-05-31', src:'한국은행', lme:false, status:'만료'  },
  { no:10, cur:'CNY', curType:'cny', month:'2026-06', rate:190,  forecast:193,  prev:188,  from:'2026-06-01', to:'2026-06-30', src:'직접입력', lme:false, status:'임시'   },
];

let activeStatus = '';

function fmt(n, dec) {
  if (n === null || n === undefined) return '-';
  if (dec) return n.toFixed(dec);
  return n.toLocaleString();
}

function curBadge(cur) { return cur; }

function deltaCell(rate, prev) {
  if (prev === null) return '<span style="color:var(--text-mute);font-size:11px">-</span>';
  const d = rate - prev;
  const sign = d > 0 ? '+' : '';
  if (d > 0) return `<span style="color:var(--text-sub);font-size:11px">&#9650; ${sign}${d.toLocaleString()}</span>`;
  if (d < 0) return `<span style="color:var(--text-mute);font-size:11px">&#9660; ${d.toLocaleString()}</span>`;
  return '<span style="color:var(--text-mute);font-size:11px">-</span>';
}

function lmeBadge(v) {
  return v
    ? '<span style="font-size:11px;color:var(--text-sub)">연동</span>'
    : '<span style="font-size:11px;color:var(--text-mute)">-</span>';
}

function statusBadge(s) {
  const map = { '적용중':'st-ok', '예정':'st-prog', '만료':'st-wait', '임시':'st-wait' };
  return `<span class="st ${map[s] || 'st-wait'}">${s}</span>`;
}

function updateStrip(rows) {
  document.getElementById('cnt-all').textContent     = rows.length;
  document.getElementById('cnt-active').textContent  = rows.filter(r => r.status === '적용중').length;
  document.getElementById('cnt-plan').textContent    = rows.filter(r => r.status === '예정').length;
  document.getElementById('cnt-expired').textContent = rows.filter(r => r.status === '만료').length;
  document.getElementById('cnt-temp').textContent    = rows.filter(r => r.status === '임시').length;
}

function renderRows(rows) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows.forEach(r => {
    const tr = document.createElement('tr');
    const rateStr = r.cur === 'JPY' ? r.rate.toFixed(2) : r.rate.toLocaleString();
    const fcastStr = r.cur === 'JPY' ? (r.forecast ? r.forecast.toFixed(2) : '-') : fmt(r.forecast);
    tr.innerHTML = `
      <td style="text-align:center">
        <input type="checkbox" class="row-chk"
          style="width:14px;height:14px;accent-color:var(--blue);cursor:pointer"
          onchange="onRowCheck()">
      </td>
      <td class="c" style="color:var(--text-mute)">${r.no}</td>
      <td class="c" style="color:var(--text-sub)">${curBadge(r.cur)}</td>
      <td class="c" style="color:var(--text-sub);font-variant-numeric:tabular-nums">${r.month}</td>
      <td class="r" style="font-weight:600;font-variant-numeric:tabular-nums">${rateStr}</td>
      <td class="r" style="color:var(--text-sub);font-variant-numeric:tabular-nums">${fcastStr}</td>
      <td class="r">${deltaCell(r.rate, r.prev)}</td>
      <td style="padding-left:10px;font-size:11px;color:var(--text-sub);font-variant-numeric:tabular-nums">
        ${r.from} ~ ${r.to}
      </td>
      <td class="c" style="font-size:11px;color:var(--text-sub)">${r.src}</td>
      <td class="c">${lmeBadge(r.lme)}</td>
      <td class="c">${statusBadge(r.status)}</td>
      <td class="c">
        <button class="btn btn-ghost btn-sm btn-grid" onclick="event.stopPropagation();openModal()">
          <i data-lucide="pencil"></i>
        </button>
      </td>
    `;
    tr.style.cursor = 'pointer';
    tr.addEventListener('click', e => {
      if (e.target.tagName === 'INPUT' || e.target.closest('button')) return;
      const chk = tr.querySelector('.row-chk');
      chk.checked = !chk.checked;
      tr.classList.toggle('selected', chk.checked);
      onRowCheck();
    });
    tbody.appendChild(tr);
  });
  lucide.createIcons();
}

function getBaseFiltered() {
  const q    = document.getElementById('f-search').value.trim().toLowerCase();
  const cur  = (document.getElementById('f-cur')   || {}).value || '';
  const mon  = (document.getElementById('f-month') || {}).value || '';
  const src  = (document.getElementById('f-src')   || {}).value || '';
  const from = document.getElementById('f-from').value;
  const to   = document.getElementById('f-to').value;

  return ROWS.filter(r => {
    if (q   && !r.cur.toLowerCase().includes(q) && !r.month.includes(q)) return false;
    if (cur && r.cur !== cur)   return false;
    if (mon && r.month !== mon) return false;
    if (src && r.src !== src)   return false;
    if (from && r.from < from)  return false;
    if (to   && r.to   > to)    return false;
    return true;
  });
}

function applyFilter() {
  const base = getBaseFiltered();
  const rows = activeStatus ? base.filter(r => r.status === activeStatus) : base;
  renderRows(rows);
  updateStrip(base);
  resetChecks();
}

function setStatus(btn, s) {
  activeStatus = s;
  document.querySelectorAll('.ss-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function toggleFilter() { document.getElementById('filter-panel').classList.toggle('open'); }
function toggleStatusPanel() {
  const s = document.getElementById('status-strip');
  s.style.display = s.style.display === 'none' ? 'flex' : 'none';
}

function toggleAll(master) {
  document.querySelectorAll('.row-chk').forEach(c => {
    c.checked = master.checked;
    c.closest('tr').classList.toggle('selected', master.checked);
  });
  onRowCheck();
}

function onRowCheck() {
  const all     = document.querySelectorAll('.row-chk');
  const checked = document.querySelectorAll('.row-chk:checked');
  const master  = document.getElementById('chk-all');
  master.indeterminate = checked.length > 0 && checked.length < all.length;
  master.checked       = all.length > 0 && checked.length === all.length;
}

function resetChecks() {
  document.getElementById('chk-all').checked       = false;
  document.getElementById('chk-all').indeterminate = false;
}

function openModal() {
  document.getElementById('modal-reg').classList.add('open');
  lucide.createIcons();
}

function closeModal() { document.getElementById('modal-reg').classList.remove('open'); }

function saveModal() {
  closeModal();
  showToast('환율 정보가 저장되었습니다.', 'ok');
}

let _tt;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  const color = type === 'ok' ? '#16a34a' : '#dc2626';
  const icon  = type === 'ok' ? 'check-circle' : 'alert-circle';
  t.innerHTML = `<i data-lucide="${icon}" style="width:16px;height:16px;color:${color}"></i>${msg}`;
  t.style.display = 'flex';
  lucide.createIcons();
  clearTimeout(_tt);
  _tt = setTimeout(() => { t.style.display = 'none'; }, 2400);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

updateStrip(ROWS);
renderRows(ROWS);
</script>
<script src="../common/sidebar.js"></script>
</body>
</html>
