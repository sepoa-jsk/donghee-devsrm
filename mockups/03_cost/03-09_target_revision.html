<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>단계별 목표원가 차수 관리 | DevSRM</title>
<link rel="stylesheet" href="../common/tokens.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .search-wrap { flex:1; position:relative; max-width:560px; }
  .search-wrap input {
    width:100%; height:32px; border:1px solid var(--border); border-radius:4px;
    padding:0 34px 0 12px; font-size:13px; font-family:'Pretendard',sans-serif;
    color:var(--text); background:var(--surface); outline:none; transition:border-color .15s;
  }
  .search-wrap input:focus { border-color:var(--blue); box-shadow:0 0 0 2px rgba(26,86,170,.12); }
  .search-wrap input::placeholder { color:var(--text-mute); }
  .search-wrap .s-icon { position:absolute; right:9px; top:50%; transform:translateY(-50%); color:#dc2626; pointer-events:none; }

  .btn-ctrl {
    height:32px; padding:0 12px; border-radius:4px;
    font-size:13px; font-family:'Pretendard',sans-serif; font-weight:500;
    display:inline-flex; align-items:center; gap:5px;
    background:var(--surface); border:1px solid var(--border); color:var(--text);
    cursor:pointer; white-space:nowrap; transition:background .12s;
  }
  .btn-ctrl:hover { background:var(--bg); }

  .date-range {
    height:32px; display:flex; align-items:center; gap:4px;
    border:1px solid var(--border); border-radius:4px;
    padding:0 10px; background:var(--surface); font-size:12px;
  }
  .date-range input[type="date"] {
    border:none; outline:none; font-size:12px;
    font-family:'Pretendard',sans-serif; color:var(--text);
    background:transparent; width:108px; cursor:pointer;
  }
  .date-range input[type="date"]::-webkit-calendar-picker-indicator { display:none; }
  .date-range .dr-sep { color:var(--text-mute); }

  .status-strip {
    height:36px; background:var(--surface);
    display:flex; align-items:center; padding:0 24px; gap:24px; flex-shrink:0;
  }
  .ss-btn {
    background:none; border:none; cursor:pointer;
    font-size:12px; color:var(--text-sub); font-family:'Pretendard',sans-serif;
    display:flex; align-items:center; gap:5px; padding:0; transition:color .1s;
  }
  .ss-btn:hover { color:var(--text); }
  .ss-btn.active { color:var(--blue); font-weight:600; }
  .ss-cnt { font-weight:700; font-variant-numeric:tabular-nums; }
  .ss-btn.active .ss-cnt { color:var(--blue); }

  .filter-panel {
    background:var(--bg); border-bottom:1px solid var(--border);
    padding:10px 24px; display:none; flex-shrink:0;
    gap:16px; align-items:center; flex-wrap:wrap;
  }
  .filter-panel.open { display:flex; }

  .grid-area {
    flex:1; overflow:hidden; display:flex; flex-direction:column;
    padding:14px 24px 16px;
  }
  .table-fill { flex:1; overflow-y:auto; }
  .table-fill::-webkit-scrollbar { width:6px; }
  .table-fill::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:3px; }

  .td-link { color:var(--blue); font-weight:600; text-decoration:none; }
  .td-link:hover { text-decoration:underline; }

  /* 상태 */
  .st { display:inline-flex; align-items:center; gap:5px; font-size:12px; white-space:nowrap; }
  .st::before { content:''; width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .st-ok   { color:var(--text);       } .st-ok::before   { background:var(--navy); }
  .st-prog { color:var(--text-sub);   } .st-prog::before { background:var(--text-sub); }
  .st-wait { color:var(--text-mute);  } .st-wait::before { background:var(--border-strong); }
  .st-bad  { color:var(--status-bad); } .st-bad::before  { background:var(--status-bad); }

  /* 차수 비교 패널 */
  .compare-panel {
    display:none; flex-shrink:0;
    background:var(--surface); border:1px solid var(--border);
    border-radius:4px; margin:0 24px 14px;
  }
  .compare-panel.open { display:block; }
  .compare-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px; border-bottom:1px solid var(--border);
    background:var(--grid-head);
  }
  .compare-title { font-size:13px; font-weight:600; color:var(--text); }
  table.compare-table { width:100%; border-collapse:collapse; font-size:12px; }
  table.compare-table th {
    background:var(--grid-head); padding:0 14px; height:30px;
    font-size:11px; font-weight:600; color:var(--text-sub);
    text-align:center; border-bottom:1px solid var(--border);
    border-right:1px solid var(--border);
  }
  table.compare-table th:last-child { border-right:none; }
  table.compare-table td {
    padding:0 14px; height:32px;
    border-bottom:1px solid var(--border);
    border-right:1px solid var(--border);
    vertical-align:middle; font-variant-numeric:tabular-nums;
  }
  table.compare-table td:last-child { border-right:none; }
  table.compare-table tbody tr:last-child td { border-bottom:none; }
  table.compare-table td.label { font-size:11px; color:var(--text-mute); background:var(--grid-head); }
  table.compare-table td.val   { text-align:right; font-weight:500; color:var(--text); }
  table.compare-table td.delta-up   { text-align:right; color:var(--status-bad); font-weight:600; }
  table.compare-table td.delta-down { text-align:right; color:var(--status-ok);  font-weight:600; }
  table.compare-table td.delta-zero { text-align:right; color:var(--text-mute); }
  table.compare-table tr.highlight td { background:#f8f9fb; }

  /* 단계 표시 */
  .stage-tag {
    font-size:11px; color:var(--text-sub); background:var(--grid-head);
    border:1px solid var(--border); border-radius:2px;
    padding:1px 7px; white-space:nowrap;
  }
  /* 차수 번호 */
  .rev-no {
    font-size:12px; font-weight:700; color:var(--navy);
    font-variant-numeric:tabular-nums;
  }
</style>
</head>

<body data-menu="03-09">
<div class="page-wrap">

  <!-- 타이틀 바 -->
  <div class="page-title-bar">
    <span class="page-title">단계별 목표원가 차수 관리</span>
  </div>

  <!-- 검색 바 -->
  <div class="search-bar" style="gap:8px">
    <div class="search-wrap">
      <input type="text" id="f-search" placeholder="Search" oninput="applyFilter()">
      <i data-lucide="search" class="s-icon" style="width:15px;height:15px"></i>
    </div>
    <button class="btn-ctrl" onclick="toggleFilter()">
      <i data-lucide="filter" style="width:14px;height:14px;color:#dc2626"></i>필터

    <button class="btn-ctrl" onclick="toggleStatusPanel()">

    <div class="date-range">
      <input type="date" id="f-from" value="2026-01-01" onchange="applyFilter()">

      <i data-lucide="calendar" style="width:14px;height:14px;color:var(--text-mute);margin-left:2px"></i>
    </div>
    <div class="ml-auto" style="display:flex;gap:8px">
      <button class="btn btn-secondary" id="btn-compare" onclick="openCompare()" disabled>

      </button>
      <button class="btn btn-primary" onclick="location.href='03-02_target_detail.html'">

  </div>

  <!-- 필터 패널 -->
  <div class="filter-panel" id="filter-panel">
    <div class="search-field">

      <input type="text" class="search-input" id="f-proj" placeholder="코드/명" style="width:150px" oninput="applyFilter()">
    </div>
    <div class="search-field">
      <span class="search-label">품번</span>
      <input type="text" class="search-input" id="f-code" placeholder="품번" style="width:110px" oninput="applyFilter()">
    </div>
    <div class="search-field">
      <span class="search-label">개발 단계</span>
      <select class="search-select" id="f-stage" onchange="applyFilter()" style="width:120px">
        <option value="">전체</option>
        <option>RFQ 접수</option>
        <option>프로젝트 승인</option>
        <option>BOM 확정</option>
        <option>원가 검토</option>
        <option>RFQ 발송</option>
        <option>견적 비교</option>
        <option>협상 완료</option>
        <option>단가 확정</option>
      </select>
    </div>
    <div class="search-field">
      <span class="search-label">차수</span>
      <select class="search-select" id="f-rev" onchange="applyFilter()" style="width:80px">
        <option value="">전체</option>
        <option value="1차">1차</option>
        <option value="2차">2차</option>
        <option value="3차">3차</option>
        <option value="4차">4차</option>
      </select>
    </div>
  </div>

  <!-- 상태 스트립 -->
  <div class="status-strip" id="status-strip">
    <button class="ss-btn active" data-s="" onclick="setStatus(this,'')">
      전체 <span class="ss-cnt" id="cnt-all">0</span>
    </button>
    <button class="ss-btn" data-s="확정" onclick="setStatus(this,'확정')">
      확정 <span class="ss-cnt" id="cnt-confirmed">0</span>
    </button>
    <button class="ss-btn" data-s="검토중" onclick="setStatus(this,'검토중')">
      검토중 <span class="ss-cnt" id="cnt-review">0</span>
    </button>
    <button class="ss-btn" data-s="작성중" onclick="setStatus(this,'작성중')">
      작성중 <span class="ss-cnt" id="cnt-draft">0</span>
    </button>
  </div>

  <!-- 차수 비교 패널 -->
  <div class="compare-panel" id="compare-panel">
    <div class="compare-header">
      <span class="compare-title">차수 비교</span>
      <button class="btn btn-ghost btn-sm" onclick="closeCompare()">
        <i data-lucide="x"></i>닫기
      </button>
    </div>
    <div style="overflow-x:auto">
      <table class="compare-table" id="compare-table"></table>
    </div>
  </div>

  <!-- 그리드 -->
  <div class="grid-area">
    <div class="table-fill">
      <table class="data-table" id="main-table">
        <thead>
          <tr>
            <th style="width:36px">
              <input type="checkbox" id="chk-all" onclick="toggleAll(this)"
                style="width:14px;height:14px;accent-color:var(--blue);cursor:pointer">
            </th>
            <th style="width:36px">No</th>
            <th style="width:160px">프로젝트</th>
            <th style="width:110px">품번</th>
            <th>품명</th>
            <th style="width:50px">차수</th>
            <th style="width:100px">개발 단계</th>
            <th style="width:96px">기준일</th>
            <th class="r" style="width:108px">고객목표판매가</th>
            <th class="r" style="width:64px">마진율</th>
            <th class="r" style="width:108px">허용총원가</th>
            <th class="r" style="width:116px">목표구매단가</th>
            <th class="r" style="width:100px">전차수 대비</th>
            <th style="width:180px">변경 사유</th>
            <th style="width:80px">승인자</th>
            <th style="width:70px">상태</th>
            <th style="width:56px">상세</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const ROWS = [
  /* H1110-T100 */
  { no:1,  proj:'PJT-520PHEV-FT-2026', projName:'520 PHEV FTM',         code:'H1110-T100', name:"Frame Sub Ass'y",    rev:'1차', stage:'RFQ 접수',    date:'2026-01-05', sell:16000, margin:15, allow:13600, target:12100, delta:null,  reason:'초도 목표가 설정',            approver:'이팀장', status:'확정'  },
  { no:2,  proj:'PJT-520PHEV-FT-2026', projName:'520 PHEV FTM',         code:'H1110-T100', name:"Frame Sub Ass'y",    rev:'2차', stage:'원가 검토',   date:'2026-02-10', sell:16000, margin:15, allow:13600, target:12100, delta:0,     reason:'LME 변동 반영 재검토',         approver:'이팀장', status:'확정'  },
  { no:3,  proj:'PJT-520PHEV-FT-2026', projName:'520 PHEV FTM',         code:'H1110-T100', name:"Frame Sub Ass'y",    rev:'3차', stage:'RFQ 발송',    date:'2026-03-15', sell:16000, margin:14, allow:13760, target:12260, delta:160,   reason:'목표마진율 하향 조정 (15→14%)', approver:'박부장', status:'확정'  },
  { no:4,  proj:'PJT-520PHEV-FT-2026', projName:'520 PHEV FTM',         code:'H1110-T100', name:"Frame Sub Ass'y",    rev:'4차', stage:'견적 비교',   date:'2026-04-20', sell:16000, margin:14, allow:13760, target:12260, delta:0,     reason:'견적 수신 후 목표가 재확인',     approver:'-',     status:'작성중' },
  /* H1110-T101 */
  { no:5,  proj:'PJT-520PHEV-FT-2026', projName:'520 PHEV FTM',         code:'H1110-T101', name:'Bracket Assy Upper', rev:'1차', stage:'RFQ 접수',    date:'2026-01-05', sell:null,  margin:null, allow:2640,  target:2200, delta:null, reason:'초도 목표가 설정',             approver:'이팀장', status:'확정'  },
  { no:6,  proj:'PJT-520PHEV-FT-2026', projName:'520 PHEV FTM',         code:'H1110-T101', name:'Bracket Assy Upper', rev:'2차', stage:'원가 검토',   date:'2026-02-10', sell:null,  margin:null, allow:2520,  target:2100, delta:-100, reason:'원가 절감 목표 반영',           approver:'이팀장', status:'확정'  },
  /* H2210-R200 */
  { no:7,  proj:'PJT-SANTA-RB-2026',   projName:'싼타페 2027 후면범퍼', code:'H2210-R200', name:'Rear Bumper Assy',  rev:'1차', stage:'RFQ 접수',    date:'2026-02-01', sell:24000, margin:12,   allow:22200, target:18500, delta:null, reason:'초도 목표가 설정',             approver:'이팀장', status:'확정'  },
  { no:8,  proj:'PJT-SANTA-RB-2026',   projName:'싼타페 2027 후면범퍼', code:'H2210-R200', name:'Rear Bumper Assy',  rev:'2차', stage:'BOM 확정',    date:'2026-03-10', sell:24000, margin:12,   allow:22200, target:18500, delta:0,   reason:'BOM 확정 후 목표가 유지',        approver:'박부장', status:'확정'  },
  /* H3310-B150 */
  { no:9,  proj:'PJT-ION9-BM-2026',    projName:'아이오닉9 배터리마운트', code:'H3310-B150', name:'Battery Mount Assy', rev:'1차', stage:'프로젝트 승인', date:'2026-03-01', sell:31000, margin:15, allow:25800, target:21500, delta:null, reason:'초도 목표가 설정',           approver:'이팀장', status:'확정'  },
  { no:10, proj:'PJT-ION9-BM-2026',    projName:'아이오닉9 배터리마운트', code:'H3310-B150', name:'Battery Mount Assy', rev:'2차', stage:'원가 검토',  date:'2026-04-15', sell:31000, margin:15, allow:25500, target:21250, delta:-250, reason:'소재 단가 인하 반영',          approver:'-',     status:'검토중' },
];

let activeStatus = '';

function fmt(n) { return n !== null && n !== undefined ? n.toLocaleString() : '-'; }
function fmtPct(n) { return n !== null && n !== undefined ? n + '%' : '-'; }

function deltaCell(d) {
  if (d === null) return '<span style="color:var(--text-mute);font-size:11px">초도</span>';
  if (d === 0)    return '<span style="color:var(--text-mute);font-size:11px">변동 없음</span>';
  const sign = d > 0 ? '+' : '';
  const cls  = d > 0 ? 'color:var(--status-bad)' : 'color:var(--status-ok)';
  return `<span style="${cls};font-weight:600;font-size:12px;font-variant-numeric:tabular-nums">${sign}${d.toLocaleString()}</span>`;
}

function stText(s) {
  const map = { '확정':'st-ok', '검토중':'st-prog', '작성중':'st-wait', '반려':'st-bad' };
  return `<span class="st ${map[s] || 'st-wait'}">${s}</span>`;
}

function updateStrip(rows) {
  document.getElementById('cnt-all').textContent      = rows.length;
  document.getElementById('cnt-confirmed').textContent= rows.filter(r => r.status === '확정').length;
  document.getElementById('cnt-review').textContent   = rows.filter(r => r.status === '검토중').length;
  document.getElementById('cnt-draft').textContent    = rows.filter(r => r.status === '작성중').length;
}

function renderRows(rows) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows.forEach(r => {
    const tr = document.createElement('tr');
    tr.style.cursor = 'pointer';
    tr.dataset.idx = ROWS.indexOf(r);
    tr.innerHTML = `
      <td style="text-align:center">
        <input type="checkbox" class="row-chk"
          style="width:14px;height:14px;accent-color:var(--blue);cursor:pointer"
          onchange="onRowCheck()">
      </td>
      <td style="text-align:center;color:var(--text-mute)">${r.no}</td>
      <td style="padding-left:10px">
        <div style="font-weight:500;color:var(--text)">${r.projName}</div>
        <div style="font-size:11px;color:var(--text-mute)">${r.proj}</div>
      </td>
      <td style="text-align:center">
        <a href="03-02_target_detail.html" class="td-link" onclick="event.stopPropagation()">${r.code}</a>
      </td>
      <td style="padding-left:10px;color:var(--text-sub)">${r.name}</td>
      <td style="text-align:center"><span class="rev-no">${r.rev}</span></td>
      <td style="text-align:center"><span class="stage-tag">${r.stage}</span></td>
      <td style="text-align:center;color:var(--text-sub);font-size:11px;font-variant-numeric:tabular-nums">${r.date}</td>
      <td style="text-align:right;font-variant-numeric:tabular-nums">${fmt(r.sell)}</td>
      <td style="text-align:right">${fmtPct(r.margin)}</td>
      <td style="text-align:right;font-variant-numeric:tabular-nums;color:var(--text-sub)">${fmt(r.allow)}</td>
      <td style="text-align:right;font-weight:600;font-variant-numeric:tabular-nums">${fmt(r.target)}</td>
      <td style="text-align:right">${deltaCell(r.delta)}</td>
      <td style="padding-left:10px;color:var(--text-sub);font-size:11px;white-space:normal;max-width:180px">${r.reason}</td>
      <td style="text-align:center;font-size:11px;color:var(--text-sub)">${r.approver}</td>
      <td style="text-align:center">${stText(r.status)}</td>
      <td style="text-align:center">
        <button class="btn btn-ghost btn-sm btn-grid"
          onclick="event.stopPropagation();location.href='03-02_target_detail.html'">
          <i data-lucide="chevron-right"></i>
        </button>
      </td>
    `;
    tr.addEventListener('click', e => {
      if (e.target.tagName === 'INPUT' || e.target.closest('button') || e.target.tagName === 'A') return;
      const chk = tr.querySelector('.row-chk');
      chk.checked = !chk.checked;
      tr.classList.toggle('selected', chk.checked);
      onRowCheck();
    });
    tbody.appendChild(tr);
  });
  lucide.createIcons();
}

function getBaseFiltered() {
  const q     = document.getElementById('f-search').value.trim().toLowerCase();
  const proj  = (document.getElementById('f-proj')  || {}).value?.trim().toLowerCase() || '';
  const code  = (document.getElementById('f-code')  || {}).value?.trim().toLowerCase() || '';
  const stage = (document.getElementById('f-stage') || {}).value || '';
  const rev   = (document.getElementById('f-rev')   || {}).value || '';
  const from  = document.getElementById('f-from').value;
  const to    = document.getElementById('f-to').value;

  return ROWS.filter(r => {
    if (q     && !r.proj.toLowerCase().includes(q) && !r.projName.toLowerCase().includes(q)
               && !r.code.toLowerCase().includes(q) && !r.name.toLowerCase().includes(q)) return false;
    if (proj  && !r.proj.toLowerCase().includes(proj) && !r.projName.toLowerCase().includes(proj)) return false;
    if (code  && !r.code.toLowerCase().includes(code)) return false;
    if (stage && r.stage !== stage) return false;
    if (rev   && r.rev !== rev)     return false;
    if (from  && r.date < from)     return false;
    if (to    && r.date > to)       return false;
    return true;
  });
}

function applyFilter() {
  const base = getBaseFiltered();
  const rows = activeStatus ? base.filter(r => r.status === activeStatus) : base;
  renderRows(rows);
  updateStrip(base);
  resetChecks();
  closeCompare();
}

function setStatus(btn, s) {
  activeStatus = s;
  document.querySelectorAll('.ss-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function toggleFilter() { document.getElementById('filter-panel').classList.toggle('open'); }
function toggleStatusPanel() {
  const s = document.getElementById('status-strip');
  s.style.display = s.style.display === 'none' ? 'flex' : 'none';
}

function toggleAll(master) {
  const chks = document.querySelectorAll('.row-chk');
  chks.forEach(c => {
    c.checked = master.checked;
    c.closest('tr').classList.toggle('selected', master.checked);
  });
  onRowCheck();
}

function onRowCheck() {
  const all     = document.querySelectorAll('.row-chk');
  const checked = document.querySelectorAll('.row-chk:checked');
  const master  = document.getElementById('chk-all');
  master.indeterminate = checked.length > 0 && checked.length < all.length;
  master.checked       = all.length > 0 && checked.length === all.length;
  document.getElementById('btn-compare').disabled = checked.length !== 2;
}

function resetChecks() {
  document.getElementById('chk-all').checked       = false;
  document.getElementById('chk-all').indeterminate = false;
  document.getElementById('btn-compare').disabled  = true;
}

/* ── 차수 비교 ── */
function openCompare() {
  const trs = Array.from(document.querySelectorAll('#tbody tr')).filter(tr => tr.querySelector('.row-chk:checked'));
  if (trs.length !== 2) return;

  const getRow = tr => ROWS[parseInt(tr.dataset.idx)];
  const [a, b] = trs.map(getRow);

  const LABELS = [
    ['품번',        r => r.code],
    ['품명',        r => r.name],
    ['차수',        r => r.rev],
    ['개발 단계',   r => r.stage],
    ['기준일',      r => r.date],
    ['고객목표판매가', r => fmt(r.sell) + (r.sell ? '원' : '')],
    ['마진율',      r => fmtPct(r.margin)],
    ['허용총원가',  r => fmt(r.allow) + (r.allow ? '원' : '')],
    ['목표구매단가', r => fmt(r.target) + '원', true],
    ['변경 사유',   r => r.reason],
    ['승인자',      r => r.approver],
    ['상태',        r => r.status],
  ];

  let html = `<thead><tr>
    <th style="width:140px">항목</th>
    <th>${a.rev} (${a.date})</th>
    <th>${b.rev} (${b.date})</th>
    <th style="width:120px">차이</th>
  </tr></thead><tbody>`;

  LABELS.forEach(([label, fn, highlight]) => {
    const va = fn(a), vb = fn(b);
    let diffCell = '<td class="delta-zero">-</td>';
    if (label === '목표구매단가') {
      const d = (b.target || 0) - (a.target || 0);
      if (d !== 0) {
        const cls = d > 0 ? 'delta-up' : 'delta-down';
        diffCell = `<td class="${cls}">${d > 0 ? '+' : ''}${d.toLocaleString()}원</td>`;
      }
    }
    const hl = highlight ? ' class="highlight"' : '';
    html += `<tr${hl}>
      <td class="label">${label}</td>
      <td class="val">${va}</td>
      <td class="val">${vb}</td>
      ${diffCell}
    </tr>`;
  });

  html += '</tbody>';
  document.getElementById('compare-table').innerHTML = html;
  document.getElementById('compare-panel').classList.add('open');
}

function closeCompare() {
  document.getElementById('compare-panel').classList.remove('open');
}

updateStrip(ROWS);
renderRows(ROWS);
</script>
<script src="../common/sidebar.js"></script>
</body>
</html>
