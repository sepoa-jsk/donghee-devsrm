<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>목표가 설정 목록 | DevSRM</title>
<link rel="stylesheet" href="../common/tokens.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  /* ── 검색 인풋 (wide, icon 내장) ── */
  .search-wrap {
    flex: 1; position: relative; max-width: 560px;
  }
  .search-wrap input {
    width: 100%; height: 32px;
    border: 1px solid var(--border); border-radius: 4px;
    padding: 0 34px 0 12px;
    font-size: 13px; font-family: 'Pretendard', sans-serif;
    color: var(--text); background: var(--surface);
    outline: none; transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(26,86,170,.12); }
  .search-wrap input::placeholder { color: var(--text-mute); }
  .search-wrap .s-icon {
    position: absolute; right: 9px; top: 50%; transform: translateY(-50%);
    color: #dc2626; pointer-events: none;
  }

  /* ── 필터·상태 버튼 (동일 스타일) ── */
  .btn-filter {
    height: 32px; padding: 0 12px; border-radius: 4px;
    font-size: 13px; font-family: 'Pretendard', sans-serif; font-weight: 500;
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    cursor: pointer; white-space: nowrap; transition: background .12s;
  }
  .btn-filter:hover { background: var(--bg); }

  .btn-status {
    height: 32px; padding: 0 12px; border-radius: 4px;
    font-size: 13px; font-family: 'Pretendard', sans-serif; font-weight: 500;
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    cursor: pointer; white-space: nowrap; transition: background .12s;
  }
  .btn-status:hover { background: var(--bg); }

  /* ── 날짜 범위 ── */
  .date-range {
    height: 32px; display: flex; align-items: center; gap: 4px;
    border: 1px solid var(--border); border-radius: 4px;
    padding: 0 10px; background: var(--surface); font-size: 12px; color: var(--text);
  }
  .date-range input[type="date"] {
    border: none; outline: none; font-size: 12px;
    font-family: 'Pretendard', sans-serif; color: var(--text);
    background: transparent; width: 108px; cursor: pointer;
  }
  /* 브라우저 기본 달력 아이콘 숨김 */
  .date-range input[type="date"]::-webkit-calendar-picker-indicator { display: none; }
  .date-range .dr-sep { color: var(--text-mute); }

  /* ── 상태 스트립 (검색 바 하단) ── */
  .status-strip {
    height: 36px;
    background: var(--surface);
    display: flex; align-items: center;
    padding: 0 24px; gap: 24px;
    flex-shrink: 0;
  }
  .ss-btn {
    background: none; border: none; cursor: pointer;
    font-size: 12px; color: var(--text-sub); font-family: 'Pretendard', sans-serif;
    display: flex; align-items: center; gap: 5px; padding: 0;
    transition: color .1s;
  }
  .ss-btn:hover { color: var(--text); }
  .ss-btn.active { color: var(--blue); font-weight: 600; }
  .ss-cnt { font-weight: 700; font-variant-numeric: tabular-nums; }
  .ss-btn.active .ss-cnt { color: var(--blue); }

  /* ── 필터 패널 (토글) ── */
  .filter-panel {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: none; flex-shrink: 0;
    gap: 16px; align-items: center; flex-wrap: wrap;
  }
  .filter-panel.open { display: flex; }

  /* ── 그리드 ── */
  .grid-area {
    flex: 1; overflow: hidden;
    display: flex; flex-direction: column;
    padding: 14px 24px 16px;
  }
  .table-fill { flex: 1; overflow-y: auto; }
  .table-fill::-webkit-scrollbar { width: 6px; }
  .table-fill::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  .td-link { color: var(--blue); font-weight: 600; text-decoration: none; }
  .td-link:hover { text-decoration: underline; }
  .st { display:inline-flex; align-items:center; gap:5px; font-size:12px; white-space:nowrap; }
  .st::before { content:''; width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .st-ok   { color:var(--text);       } .st-ok::before   { background:var(--navy); }
  .st-prog { color:var(--text-sub);   } .st-prog::before { background:var(--text-sub); }
  .st-wait { color:var(--text-mute);  } .st-wait::before { background:var(--border-strong); }
  .st-bad  { color:var(--status-bad); } .st-bad::before  { background:var(--status-bad); }
</style>
</head>

<body data-menu="03-01">
<div class="page-wrap">

  <!-- 타이틀 바 -->
  <div class="page-title-bar">
    <span class="page-title">목표가 설정 목록</span>
  </div>

  <!-- 검색 바 -->
  <div class="search-bar" style="gap:8px">
    <!-- 검색 인풋 -->
    <div class="search-wrap">
      <input type="text" id="f-search" placeholder="Search" oninput="applyFilter()">
      <i data-lucide="search" class="s-icon" style="width:15px;height:15px"></i>
    </div>
    <!-- 필터 버튼 -->
    <button class="btn-filter" onclick="toggleFilter()">
      <i data-lucide="filter" style="width:14px;height:14px;color:#dc2626"></i>필터
    </button>
    <!-- 상태 버튼 -->
    <button class="btn-status" onclick="toggleStatusPanel()">
      <i data-lucide="bar-chart-2" style="width:14px;height:14px;color:var(--blue)"></i>상태
    </button>
    <!-- 날짜 범위 -->
    <div class="date-range">
      <input type="date" id="f-from" value="2026-05-04" onchange="applyFilter()">
      <span class="dr-sep">~</span>
      <input type="date" id="f-to" value="2026-06-04" onchange="applyFilter()">
      <i data-lucide="calendar" style="width:14px;height:14px;color:var(--text-mute);margin-left:2px"></i>
    </div>
    <!-- 우측: 등록 버튼 -->
    <div class="ml-auto">
      <button class="btn btn-primary" onclick="location.href='03-02_target_detail.html'">
        <i data-lucide="plus"></i>목표가 등록
      </button>
    </div>
  </div>

  <!-- 필터 패널 (필터 버튼 클릭 시 펼침) -->
  <div class="filter-panel" id="filter-panel">
    <div class="search-field">
      <span class="search-label">프로젝트</span>
      <input type="text" class="search-input" id="f-proj" placeholder="코드/명" style="width:140px" oninput="applyFilter()">
    </div>
    <div class="search-field">
      <span class="search-label">품번</span>
      <input type="text" class="search-input" id="f-code" placeholder="품번" style="width:110px" oninput="applyFilter()">
    </div>
    <div class="search-field">
      <span class="search-label">차수</span>
      <select class="search-select" id="f-rev" onchange="applyFilter()" style="width:76px">
        <option value="">전체</option>
        <option value="1차">1차</option>
        <option value="2차">2차</option>
        <option value="3차">3차</option>
      </select>
    </div>
  </div>

  <!-- 상태 스트립 -->
  <div class="status-strip" id="status-strip">
    <button class="ss-btn active" data-s="" onclick="setStatus(this, '')">
      전체 <span class="ss-cnt" id="cnt-all">0</span>
    </button>
    <button class="ss-btn" data-s="작성중" onclick="setStatus(this, '작성중')">
      작성중 <span class="ss-cnt" id="cnt-draft">0</span>
    </button>
    <button class="ss-btn" data-s="검토중" onclick="setStatus(this, '검토중')">
      검토중 <span class="ss-cnt" id="cnt-review">0</span>
    </button>
    <button class="ss-btn" data-s="확정" onclick="setStatus(this, '확정')">
      확정 <span class="ss-cnt" id="cnt-confirmed">0</span>
    </button>
    <button class="ss-btn" data-s="반려" onclick="setStatus(this, '반려')">
      반려 <span class="ss-cnt" id="cnt-rejected">0</span>
    </button>
  </div>

  <!-- 그리드 -->
  <div class="grid-area">
    <div class="table-fill">
      <table class="data-table" id="main-table">
        <thead>
          <tr>
            <th style="width:36px;text-align:center">
              <input type="checkbox" id="chk-all" onclick="toggleAll(this)"
                style="width:14px;height:14px;accent-color:var(--blue);cursor:pointer">
            </th>
            <th style="width:36px">No</th>
            <th style="width:180px">프로젝트</th>
            <th style="width:120px">품번</th>
            <th>품명</th>
            <th style="width:50px">차수</th>
            <th style="width:96px">기준일</th>
            <th class="r" style="width:108px">고객 목표판매가</th>
            <th class="r" style="width:68px">마진율</th>
            <th class="r" style="width:108px">허용 총원가</th>
            <th class="r" style="width:116px">목표 구매단가</th>
            <th style="width:76px">상태</th>
            <th style="width:56px">상세</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="toast" style="display:none"></div>

<script>
const ROWS = [
  { no:1, proj:'PJT-520PHEV-FT-2026', projName:'520 PHEV FTM',         code:'H1110-T100', name:"Frame Sub Ass'y",     rev:'1차', date:'2026-01-05', sellPrice:16000, margin:15,   allowCost:13600, targetPrice:12100, status:'확정'  },
  { no:2, proj:'PJT-520PHEV-FT-2026', projName:'520 PHEV FTM',         code:'H1110-T101', name:'Bracket Assy Upper',  rev:'1차', date:'2026-01-05', sellPrice:null,  margin:null, allowCost:2640,  targetPrice:2200,  status:'확정'  },
  { no:3, proj:'PJT-520PHEV-FT-2026', projName:'520 PHEV FTM',         code:'H1110-T102', name:'Cover Plate',         rev:'1차', date:'2026-01-10', sellPrice:null,  margin:null, allowCost:2160,  targetPrice:1800,  status:'검토중' },
  { no:4, proj:'PJT-520PHEV-FT-2026', projName:'520 PHEV FTM',         code:'H1110-T103', name:'Rubber Seal',         rev:'1차', date:'2026-01-10', sellPrice:null,  margin:null, allowCost:504,   targetPrice:420,   status:'작성중' },
  { no:5, proj:'PJT-SANTA-RB-2026',   projName:'싼타페 2027 후면범퍼', code:'H2210-R200', name:'Rear Bumper Assy',    rev:'1차', date:'2026-02-15', sellPrice:24000, margin:12,   allowCost:22200, targetPrice:18500, status:'확정'  },
  { no:6, proj:'PJT-SANTA-RB-2026',   projName:'싼타페 2027 후면범퍼', code:'H2210-R201', name:'Bracket Side L/H',   rev:'1차', date:'2026-02-15', sellPrice:null,  margin:null, allowCost:3960,  targetPrice:3300,  status:'확정'  },
  { no:7, proj:'PJT-ION9-BM-2026',    projName:'아이오닉9 배터리마운트', code:'H3310-B150', name:'Battery Mount Assy', rev:'1차', date:'2026-03-01', sellPrice:31000, margin:15,   allowCost:25800, targetPrice:21500, status:'검토중' },
  { no:8, proj:'PJT-ION9-BM-2026',    projName:'아이오닉9 배터리마운트', code:'H3310-B151', name:'Mount Bracket Upper',rev:'1차', date:'2026-03-01', sellPrice:null,  margin:null, allowCost:7200,  targetPrice:6000,  status:'검토중' },
  { no:9, proj:'PJT-ION9-BM-2026',    projName:'아이오닉9 배터리마운트', code:'H3310-B150', name:'Battery Mount Assy', rev:'2차', date:'2026-04-20', sellPrice:31000, margin:15,   allowCost:25500, targetPrice:21250, status:'작성중' },
];

let activeStatus = '';

function fmt(n)    { return n !== null ? n.toLocaleString() : '-'; }
function fmtPct(n) { return n !== null ? n + '%' : '-'; }

function statusBadge(s) {
  const map = { '확정':'st-ok', '검토중':'st-prog', '작성중':'st-wait', '반려':'st-bad' };
  return `<span class="st ${map[s] || 'st-wait'}">${s}</span>`;
}

function updateStrip(rows) {
  document.getElementById('cnt-all').textContent      = rows.length;
  document.getElementById('cnt-draft').textContent    = rows.filter(r => r.status === '작성중').length;
  document.getElementById('cnt-review').textContent   = rows.filter(r => r.status === '검토중').length;
  document.getElementById('cnt-confirmed').textContent= rows.filter(r => r.status === '확정').length;
  document.getElementById('cnt-rejected').textContent = rows.filter(r => r.status === '반려').length;
}

function renderRows(rows) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="text-align:center">
        <input type="checkbox" class="row-chk"
          style="width:14px;height:14px;accent-color:var(--blue);cursor:pointer"
          onchange="onRowCheck()">
      </td>
      <td class="c" style="color:var(--text-mute)">${r.no}</td>
      <td style="padding-left:10px">
        <div style="font-weight:500;color:var(--text)">${r.projName}</div>
        <div style="font-size:11px;color:var(--text-mute)">${r.proj}</div>
      </td>
      <td style="padding-left:10px">
        <a href="03-02_target_detail.html" class="td-link" onclick="event.stopPropagation()">${r.code}</a>
      </td>
      <td style="padding-left:10px;color:var(--text-sub)">${r.name}</td>
      <td class="c" style="color:var(--text-sub)">${r.rev}</td>
      <td class="c" style="color:var(--text-sub);font-variant-numeric:tabular-nums">${r.date}</td>
      <td class="r">${fmt(r.sellPrice)}</td>
      <td class="r">${fmtPct(r.margin)}</td>
      <td class="r" style="color:var(--text-sub)">${fmt(r.allowCost)}</td>
      <td class="r" style="font-weight:600">${fmt(r.targetPrice)}</td>
      <td class="c">${statusBadge(r.status)}</td>
      <td class="c">
        <button class="btn btn-ghost btn-sm btn-grid"
          onclick="event.stopPropagation();location.href='03-02_target_detail.html'">
          <i data-lucide="chevron-right"></i>
        </button>
      </td>
    `;
    tr.style.cursor = 'pointer';
    tr.addEventListener('click', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'A' || e.target.closest('button')) return;
      const chk = tr.querySelector('.row-chk');
      chk.checked = !chk.checked;
      tr.classList.toggle('selected', chk.checked);
      onRowCheck();
    });
    tbody.appendChild(tr);
  });
  lucide.createIcons();
}

function getFiltered() {
  const q     = document.getElementById('f-search').value.trim().toLowerCase();
  const proj  = (document.getElementById('f-proj')  || {}).value?.trim().toLowerCase() || '';
  const code  = (document.getElementById('f-code')  || {}).value?.trim().toLowerCase() || '';
  const rev   = (document.getElementById('f-rev')   || {}).value || '';
  const from  = document.getElementById('f-from').value;
  const to    = document.getElementById('f-to').value;

  return ROWS.filter(r => {
    if (q    && !r.proj.toLowerCase().includes(q) && !r.projName.toLowerCase().includes(q)
              && !r.code.toLowerCase().includes(q) && !r.name.toLowerCase().includes(q)) return false;
    if (proj && !r.proj.toLowerCase().includes(proj) && !r.projName.toLowerCase().includes(proj)) return false;
    if (code && !r.code.toLowerCase().includes(code)) return false;
    if (rev  && r.rev !== rev)     return false;
    if (from && r.date < from)     return false;
    if (to   && r.date > to)       return false;
    if (activeStatus && r.status !== activeStatus) return false;
    return true;
  });
}

function applyFilter() {
  const rows = getFiltered();
  renderRows(rows);
  updateStrip(getFiltered_noStatus());
  resetChecks();
}

function getFiltered_noStatus() {
  const q    = document.getElementById('f-search').value.trim().toLowerCase();
  const proj = (document.getElementById('f-proj') || {}).value?.trim().toLowerCase() || '';
  const code = (document.getElementById('f-code') || {}).value?.trim().toLowerCase() || '';
  const rev  = (document.getElementById('f-rev')  || {}).value || '';
  const from = document.getElementById('f-from').value;
  const to   = document.getElementById('f-to').value;

  return ROWS.filter(r => {
    if (q    && !r.proj.toLowerCase().includes(q) && !r.projName.toLowerCase().includes(q)
              && !r.code.toLowerCase().includes(q) && !r.name.toLowerCase().includes(q)) return false;
    if (proj && !r.proj.toLowerCase().includes(proj) && !r.projName.toLowerCase().includes(proj)) return false;
    if (code && !r.code.toLowerCase().includes(code)) return false;
    if (rev  && r.rev !== rev)  return false;
    if (from && r.date < from)  return false;
    if (to   && r.date > to)    return false;
    return true;
  });
}

function setStatus(btn, s) {
  activeStatus = s;
  document.querySelectorAll('.ss-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function toggleFilter() {
  const p = document.getElementById('filter-panel');
  p.classList.toggle('open');
}

function toggleStatusPanel() {
  const s = document.getElementById('status-strip');
  s.style.display = s.style.display === 'none' ? 'flex' : 'none';
}

function toggleAll(master) {
  document.querySelectorAll('.row-chk').forEach(c => {
    c.checked = master.checked;
    c.closest('tr').classList.toggle('selected', master.checked);
  });
  onRowCheck();
}

function onRowCheck() {
  const all     = document.querySelectorAll('.row-chk');
  const checked = document.querySelectorAll('.row-chk:checked');
  const master  = document.getElementById('chk-all');
  master.indeterminate = checked.length > 0 && checked.length < all.length;
  master.checked       = all.length > 0 && checked.length === all.length;
}

function resetChecks() {
  document.getElementById('chk-all').checked       = false;
  document.getElementById('chk-all').indeterminate = false;
}

/* init */
updateStrip(ROWS);
renderRows(ROWS);
</script>
<script src="../common/sidebar.js"></script>
</body>
</html>
